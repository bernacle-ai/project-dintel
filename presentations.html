<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations — Drone Data Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F6F1;
    --surface: #FFFFFF;
    --border: #D8D3C8;
    --ink: #1A1A2E;
    --ink2: #2D3748;
    --muted: #6B7280;
    --teal: #0D7377;
    --teal-lt: #E6F4F4;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Lato', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
    padding: 40px 20px;
  }

  .wrap { max-width: 1200px; margin: 0 auto; }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 54px);
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 12px;
  }

  h1 span { color: var(--teal); }

  .lead {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .back-link {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--teal);
    text-decoration: none;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .back-link:hover { text-decoration: underline; }

  .presentations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-top: 32px;
  }

  .ppt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .ppt-card:hover {
    border-color: var(--teal);
    box-shadow: 0 4px 20px rgba(13,115,119,0.1);
  }

  .ppt-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .ppt-desc {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .ppt-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--teal);
    margin-bottom: 16px;
  }

  .ppt-btn {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 10px 20px;
    background: var(--teal);
    color: white;
    text-decoration: none;
    border-radius: 3px;
    text-transform: uppercase;
    transition: background 0.2s;
  }

  .ppt-btn:hover { background: #0a5a5d; }

  .viewer-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    padding: 20px;
  }

  .viewer-modal.active { display: flex; align-items: center; justify-content: center; }

  .viewer-content {
    width: 100%;
    max-width: 1200px;
    height: 90vh;
    background: white;
    border-radius: 8px;
    position: relative;
  }

  .close-viewer {
    position: absolute;
    top: -40px;
    right: 0;
    background: var(--teal);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .close-viewer:hover { background: #0a5a5d; }

  .viewer-frame {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state h2 {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="wrap">
  <a href="index.html" class="back-link">← Back to Main</a>
  
  <h1>Presentations <span>Library</span></h1>
  <p class="lead">View and manage all uploaded presentations</p>

  <div id="presentations-container" class="presentations-grid">
    <div class="empty-state">
      <h2>Loading presentations...</h2>
      <p>Please wait while we fetch your content.</p>
    </div>
  </div>
</div>

<div id="viewer-modal" class="viewer-modal">
  <div class="viewer-content">
    <button class="close-viewer" onclick="closeViewer()">✕ Close</button>
    <iframe id="ppt-viewer" class="viewer-frame"></iframe>
  </div>
</div>

<script>
  // IndexedDB setup
  const DB_NAME = 'drone_presentations_db';
  const DB_VERSION = 1;
  const STORE_NAME = 'presentations';
  let db;

  // Initialize IndexedDB
  function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      
      request.onupgradeneeded = (event) => {
        db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const objectStore = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          objectStore.createIndex('uploadDate', 'uploadDate', { unique: false });
        }
      };
    });
  }

  // Get all presentations
  function getPresentations() {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readonly');
      const objectStore = transaction.objectStore(STORE_NAME);
      const request = objectStore.getAll();
      
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // Fetch presentations from IndexedDB
  async function loadPresentations() {
    const container = document.getElementById('presentations-container');
    
    try {
      const presentations = await getPresentations();
      
      if (presentations.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No presentations yet</h2>
            <p>Upload your first presentation via the <a href="upload.html" style="color: var(--teal); font-weight: 600;">upload page</a>.</p>
          </div>
        `;
        return;
      }

      // Sort by date (newest first)
      presentations.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));

      // Display presentations
      container.innerHTML = presentations.map(ppt => `
        <div class="ppt-card">
          <div class="ppt-title">${ppt.title}</div>
          <div class="ppt-desc">${ppt.description || 'No description provided'}</div>
          <div class="ppt-date">📅 ${new Date(ppt.uploadDate).toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          })}</div>
          <a href="#" class="ppt-btn" onclick="downloadPresentation(${ppt.id}); return false;">Download PPT</a>
        </div>
      `).join('');
    } catch (error) {
      console.error('Error loading presentations:', error);
      container.innerHTML = `
        <div class="empty-state">
          <h2>Error loading presentations</h2>
          <p>Please try refreshing the page.</p>
        </div>
      `;
    }
  }

  async function downloadPresentation(id) {
    const presentations = await getPresentations();
    const ppt = presentations.find(p => p.id === id);
    
    if (ppt) {
      // Create a blob from base64
      const byteString = atob(ppt.fileData.split(',')[1]);
      const mimeString = ppt.fileData.split(',')[0].split(':')[1].split(';')[0];
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      
      const blob = new Blob([ab], { type: mimeString });
      const url = URL.createObjectURL(blob);
      
      // Download the file
      const a = document.createElement('a');
      a.href = url;
      a.download = ppt.fileName;
      a.click();
      
      URL.revokeObjectURL(url);
    }
  }

  // Initialize and load presentations
  initDB().then(() => {
    loadPresentations();
  }).catch(error => {
    console.error('Database initialization failed:', error);
    const container = document.getElementById('presentations-container');
    container.innerHTML = `
      <div class="empty-state">
        <h2>Storage Error</h2>
        <p>Failed to initialize storage. Please try refreshing the page.</p>
      </div>
    `;
  });
</script>

</body>
</html>
