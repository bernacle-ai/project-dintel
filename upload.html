<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Presentation — Drone Data Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F6F1;
    --surface: #FFFFFF;
    --border: #D8D3C8;
    --ink: #1A1A2E;
    --ink2: #2D3748;
    --muted: #6B7280;
    --teal: #0D7377;
    --teal-lt: #E6F4F4;
    --green: #065F46;
    --green-lt: #D1FAE5;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Lato', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 700px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px;
    box-shadow: 0 4px 24px rgba(26,26,46,0.08);
  }

  .back-link {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--teal);
    text-decoration: none;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .back-link:hover { text-decoration: underline; }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 12px;
  }

  h1 span { color: var(--teal); }

  .lead {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .form-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  input[type="text"],
  textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    background: var(--bg);
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  textarea:focus {
    outline: none;
    border-color: var(--teal);
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  .file-upload-area {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 40px 20px;
    text-align: center;
    background: var(--bg);
    transition: all 0.3s;
    cursor: pointer;
  }

  .file-upload-area:hover {
    border-color: var(--teal);
    background: var(--teal-lt);
  }

  .file-upload-area.dragover {
    border-color: var(--teal);
    background: var(--teal-lt);
    transform: scale(1.02);
  }

  .upload-icon {
    font-size: 48px;
    color: var(--teal);
    margin-bottom: 16px;
  }

  .upload-text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
  }

  input[type="file"] {
    display: none;
  }

  .file-info {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--green-lt);
    border: 1px solid var(--green);
    border-radius: 4px;
    display: none;
  }

  .file-info.show {
    display: block;
  }

  .file-name {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }

  .btn {
    flex: 1;
    padding: 16px 24px;
    border: none;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .btn-primary {
    background: var(--teal);
    color: white;
  }

  .btn-primary:hover {
    background: #0a5a5d;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(13,115,119,0.3);
  }

  .btn-primary:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .success-message {
    display: none;
    padding: 20px;
    background: var(--green-lt);
    border: 1px solid var(--green);
    border-left: 4px solid var(--green);
    border-radius: 4px;
    margin-top: 24px;
  }

  .success-message.show {
    display: block;
  }

  .success-message h3 {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--green);
    margin-bottom: 8px;
  }

  .success-message p {
    color: var(--ink2);
    font-size: 14px;
  }

  .presentations-list {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 2px solid var(--border);
  }

  .presentations-list h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .ppt-item {
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ppt-item-info h4 {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .ppt-item-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .btn-view {
    padding: 8px 16px;
    background: var(--teal);
    color: white;
    text-decoration: none;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }

  .btn-view:hover {
    background: #0a5a5d;
  }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-link">← Back to Main</a>
  
  <h1>Upload <span>Presentation</span></h1>
  <p class="lead">Add a new PowerPoint presentation to your library</p>

  <form id="uploadForm">
    <div class="form-group">
      <label for="title">Presentation Title</label>
      <input type="text" id="title" name="title" placeholder="e.g., Founder POC Q1 2025" required>
    </div>

    <div class="form-group">
      <label for="description">Description (Optional)</label>
      <textarea id="description" name="description" placeholder="Brief description of the presentation..."></textarea>
    </div>

    <div class="form-group">
      <label>Upload PowerPoint File</label>
      <div class="file-upload-area" id="dropArea">
        <div class="upload-icon">📊</div>
        <div class="upload-text">Click to browse or drag & drop your PPT file</div>
        <div class="upload-hint">Supports .ppt, .pptx files</div>
        <input type="file" id="fileInput" accept=".ppt,.pptx" required>
      </div>
      <div class="file-info" id="fileInfo">
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear</button>
      <button type="submit" class="btn btn-primary" id="submitBtn">Upload Presentation</button>
    </div>
  </form>

  <div class="success-message" id="successMessage">
    <h3>✓ Upload Successful!</h3>
    <p>Redirecting to main page...</p>
  </div>

  <div class="presentations-list">
    <h2>Uploaded Presentations</h2>
    <div id="presentationsList"></div>
  </div>
</div>

<script>
  // IndexedDB setup for larger file storage
  const DB_NAME = 'drone_presentations_db';
  const DB_VERSION = 1;
  const STORE_NAME = 'presentations';
  let db;

  // Initialize IndexedDB
  function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      
      request.onupgradeneeded = (event) => {
        db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const objectStore = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          objectStore.createIndex('uploadDate', 'uploadDate', { unique: false });
        }
      };
    });
  }

  // Get all presentations
  function getPresentations() {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readonly');
      const objectStore = transaction.objectStore(STORE_NAME);
      const request = objectStore.getAll();
      
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // Save presentation
  function savePresentation(presentation) {
    return new Promise((resolve, reject) => {
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const objectStore = transaction.objectStore(STORE_NAME);
      const request = objectStore.add(presentation);
      
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // File upload handling
  const dropArea = document.getElementById('dropArea');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const uploadForm = document.getElementById('uploadForm');
  const successMessage = document.getElementById('successMessage');

  // Click to upload
  dropArea.addEventListener('click', () => fileInput.click());

  // File selected
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      fileName.textContent = `📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
      fileInfo.classList.add('show');
    }
  });

  // Drag and drop
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, preventDefaults, false);
  });

  function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
  }

  ['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
  });

  dropArea.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const files = dt.files;
    fileInput.files = files;
    
    if (files[0]) {
      fileName.textContent = `📄 ${files[0].name} (${(files[0].size / 1024 / 1024).toFixed(2)} MB)`;
      fileInfo.classList.add('show');
    }
  });

  // Form submission
  uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    const file = fileInput.files[0];
    
    if (!file) {
      alert('Please select a file');
      return;
    }

    // Show loading state
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading...';

    // Read file as base64
    const reader = new FileReader();
    reader.onload = async function(event) {
      try {
        const presentation = {
          id: Date.now(),
          title: title,
          description: description,
          fileName: file.name,
          fileSize: file.size,
          fileData: event.target.result,
          uploadDate: new Date().toISOString()
        };

        // Save to IndexedDB
        await savePresentation(presentation);

        // Show success
        successMessage.classList.add('show');
        
        // Redirect to index page after 2 seconds
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);

        // Reset form
        resetForm();

        // Refresh list
        await loadPresentations();

        // Reset button
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Presentation';
      } catch (error) {
        console.error('Upload error:', error);
        alert('Upload failed. File might be too large. Try a smaller file.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Presentation';
      }
    };

    reader.onerror = () => {
      alert('Error reading file');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload Presentation';
    };

    reader.readAsDataURL(file);
  });

  // Reset form
  function resetForm() {
    uploadForm.reset();
    fileInfo.classList.remove('show');
  }

  // Load and display presentations
  async function loadPresentations() {
    const presentations = await getPresentations();
    const listContainer = document.getElementById('presentationsList');

    if (presentations.length === 0) {
      listContainer.innerHTML = '<p style="color: var(--muted); font-size: 14px;">No presentations uploaded yet.</p>';
      return;
    }

    // Sort by date (newest first)
    presentations.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));

    listContainer.innerHTML = presentations.map(ppt => `
      <div class="ppt-item">
        <div class="ppt-item-info">
          <h4>${ppt.title}</h4>
          <div class="ppt-item-meta">
            ${ppt.fileName} • ${(ppt.fileSize / 1024 / 1024).toFixed(2)} MB • 
            ${new Date(ppt.uploadDate).toLocaleDateString()}
          </div>
        </div>
        <a href="#" class="btn-view" onclick="viewPresentation(${ppt.id}); return false;">Download</a>
      </div>
    `).join('');
  }

  // View presentation
  async function viewPresentation(id) {
    const presentations = await getPresentations();
    const ppt = presentations.find(p => p.id === id);
    
    if (ppt) {
      // Create a blob from base64
      const byteString = atob(ppt.fileData.split(',')[1]);
      const mimeString = ppt.fileData.split(',')[0].split(':')[1].split(';')[0];
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      
      const blob = new Blob([ab], { type: mimeString });
      const url = URL.createObjectURL(blob);
      
      // Download the file
      const a = document.createElement('a');
      a.href = url;
      a.download = ppt.fileName;
      a.click();
      
      URL.revokeObjectURL(url);
    }
  }

  // Initialize and load presentations
  initDB().then(() => {
    loadPresentations();
  }).catch(error => {
    console.error('Database initialization failed:', error);
    alert('Failed to initialize storage. Please try refreshing the page.');
  });
</script>

</body>
</html>
